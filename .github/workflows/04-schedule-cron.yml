# ============================================================
# 04: スケジュール実行 (cron) - 定期的にタスクを実行
# ============================================================
# 学べること:
#   - schedule (cron式) によるスケジュール実行
#   - 複数スケジュールの設定
#   - ヘルスチェック的な使い方
#   - cron式の構文 (分 時 日 月 曜日)
# ============================================================

name: "04 - Scheduled Tasks"

on:
  schedule:
    # 毎日 UTC 0:00 (JST 9:00) に実行
    - cron: "0 0 * * *"
    # 毎週月曜 UTC 6:00 (JST 15:00) に実行
    - cron: "0 6 * * 1"
  # 手動でもテスト実行できるようにしておく
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - name: Run tests as health check
        run: npm test

      - name: Check dependency vulnerabilities
        run: npm audit --audit-level=moderate || true

      - name: Report timestamp
        run: |
          echo "🕐 Health check completed at $(date -u)"
          echo "📅 Triggered by: ${{ github.event_name }}"
