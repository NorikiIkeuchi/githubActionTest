# ============================================================
# 12: ジョブの依存関係と並列実行
# ============================================================
# 学べること:
#   - needs によるジョブの依存関係定義
#   - 並列実行 vs 直列実行
#   - needs.*.result によるジョブ結果の参照
#   - ジョブ間でデータを受け渡す (outputs)
# ============================================================

name: "12 - Job Dependencies"

on:
  workflow_dispatch:

jobs:
  # これらは並列に実行される
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    outputs:
      test-count: ${{ steps.count.outputs.count }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm test
      - name: Count test files
        id: count
        run: echo "count=$(ls tests/*.test.js | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm audit --audit-level=moderate || true

  # lint と test の両方が成功したら実行
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "✅ Lint and test passed"
          echo "📊 Test files: ${{ needs.test.outputs.test-count }}"

  # すべてのジョブが完了したら実行
  summary:
    runs-on: ubuntu-latest
    needs: [lint, test, security, build]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "📋 Job Results:"
          echo "  Lint:     ${{ needs.lint.result }}"
          echo "  Test:     ${{ needs.test.result }}"
          echo "  Security: ${{ needs.security.result }}"
          echo "  Build:    ${{ needs.build.result }}"
