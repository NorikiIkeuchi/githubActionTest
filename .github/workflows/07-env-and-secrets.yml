# ============================================================
# 07: 環境変数とシークレット - 設定情報の管理
# ============================================================
# 学べること:
#   - env でワークフロー/ジョブ/ステップ単位の環境変数設定
#   - ${{ secrets.* }} によるシークレット参照
#   - ${{ vars.* }} によるリポジトリ変数参照
#   - GITHUB_ENV を使った動的な環境変数設定
#   - github コンテキストの活用
# ============================================================

name: "07 - Environment & Secrets"

on:
  workflow_dispatch:

# ワークフロー全体の環境変数
env:
  APP_NAME: "GitHub Actions Playground"
  NODE_ENV: production

jobs:
  show-env:
    runs-on: ubuntu-latest

    # ジョブレベルの環境変数
    env:
      JOB_ID: "show-env-job"

    steps:
      - uses: actions/checkout@v4

      - name: Workflow-level env vars
        run: |
          echo "APP_NAME: $APP_NAME"
          echo "NODE_ENV: $NODE_ENV"

      - name: Job-level env vars
        run: echo "JOB_ID: $JOB_ID"

      - name: Step-level env vars
        env:
          STEP_MESSAGE: "Hello from this step!"
        run: echo "STEP_MESSAGE: $STEP_MESSAGE"

      - name: GitHub context variables
        run: |
          echo "Repository:  ${{ github.repository }}"
          echo "Branch:      ${{ github.ref_name }}"
          echo "SHA:         ${{ github.sha }}"
          echo "Actor:       ${{ github.actor }}"
          echo "Run ID:      ${{ github.run_id }}"
          echo "Run Number:  ${{ github.run_number }}"
          echo "Event:       ${{ github.event_name }}"
          echo "Workflow:    ${{ github.workflow }}"

      - name: Set dynamic env var with GITHUB_ENV
        run: |
          echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
          echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Use dynamic env vars
        run: |
          echo "Build time: $BUILD_TIME"
          echo "Short SHA:  $SHORT_SHA"

      - name: Using secrets (example)
        env:
          # シークレットはリポジトリの Settings > Secrets で設定
          MY_SECRET: ${{ secrets.MY_SECRET || 'not-set' }}
        run: |
          echo "Secret length: ${#MY_SECRET}"
          echo "⚠️  シークレットの値はログにマスクされます"

      - name: Set step output
        id: my_step
        run: echo "my_output=hello-from-step" >> $GITHUB_OUTPUT

      - name: Use step output
        run: echo "Output from previous step: ${{ steps.my_step.outputs.my_output }}"
