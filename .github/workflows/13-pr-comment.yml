# ============================================================
# 13: PR に自動コメント - テスト結果・カバレッジを投稿
# ============================================================
# 学べること:
#   - pull_request トリガー
#   - permissions で GITHUB_TOKEN に書き込み権限を付与
#   - $GITHUB_STEP_SUMMARY でジョブサマリーに書き込む
#   - github-script アクションで PR にコメントを投稿
#   - コメントの上書き（毎回新規投稿しない）
# ============================================================

name: "13 - PR Comment"

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test-and-comment:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run tests with coverage
        id: test
        run: |
          npm test -- --coverage --coverageReporters=json-summary 2>&1 | tee test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Parse coverage
        id: coverage
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            LINES=$(node -e "const c=require('./coverage/coverage-summary.json').total; console.log(c.lines.pct)")
            STMTS=$(node -e "const c=require('./coverage/coverage-summary.json').total; console.log(c.statements.pct)")
            FUNCS=$(node -e "const c=require('./coverage/coverage-summary.json').total; console.log(c.functions.pct)")
            BRANCH=$(node -e "const c=require('./coverage/coverage-summary.json').total; console.log(c.branches.pct)")
            echo "lines=$LINES"     >> $GITHUB_OUTPUT
            echo "statements=$STMTS" >> $GITHUB_OUTPUT
            echo "functions=$FUNCS" >> $GITHUB_OUTPUT
            echo "branches=$BRANCH" >> $GITHUB_OUTPUT
          else
            echo "lines=N/A"      >> $GITHUB_OUTPUT
            echo "statements=N/A" >> $GITHUB_OUTPUT
            echo "functions=N/A"  >> $GITHUB_OUTPUT
            echo "branches=N/A"   >> $GITHUB_OUTPUT
          fi

      - name: Count test results
        id: results
        if: always()
        run: |
          PASSED=$(grep -oP 'Tests:\s+\K[0-9]+(?= passed)' test-output.txt || echo 0)
          FAILED=$(grep -oP '[0-9]+(?= failed)' test-output.txt || echo 0)
          TOTAL=$(grep -oP 'Tests:\s+.*\K[0-9]+(?= total)' test-output.txt || echo 0)
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "total=$TOTAL"   >> $GITHUB_OUTPUT

      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const testPassed = ${{ steps.results.outputs.passed || 0 }};
            const testFailed = ${{ steps.results.outputs.failed || 0 }};
            const testTotal  = ${{ steps.results.outputs.total || 0 }};

            const lines     = "${{ steps.coverage.outputs.lines }}";
            const stmts     = "${{ steps.coverage.outputs.statements }}";
            const funcs     = "${{ steps.coverage.outputs.functions }}";
            const branches  = "${{ steps.coverage.outputs.branches }}";

            const status = testFailed === 0 ? "✅ 全テスト合格" : `❌ ${testFailed} 件失敗`;

            const coverageBar = (pct) => {
              const num = parseFloat(pct);
              if (isNaN(num)) return "N/A";
              const filled = Math.round(num / 10);
              return "█".repeat(filled) + "░".repeat(10 - filled) + ` ${pct}%`;
            };

            const body = [
              `## ${status}`,
              "",
              "### テスト結果",
              "| | 件数 |",
              "|---|---|",
              `| ✅ 合格 | ${testPassed} |`,
              `| ❌ 失敗 | ${testFailed} |`,
              `| 合計   | ${testTotal} |`,
              "",
              "### カバレッジ",
              "| 項目 | カバレッジ |",
              "|---|---|",
              `| Lines      | \`${coverageBar(lines)}\` |`,
              `| Statements | \`${coverageBar(stmts)}\` |`,
              `| Functions  | \`${coverageBar(funcs)}\` |`,
              `| Branches   | \`${coverageBar(branches)}\` |`,
              "",
              `> Workflow: \`${{ github.workflow }}\` | Run: [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            ].join("\n");

            // 既存のボットコメントを探して上書き（毎回新規投稿しない）
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === "Bot" && c.body.includes("テスト結果")
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Write job summary
        if: always()
        run: |
          echo "## テスト結果サマリー" >> $GITHUB_STEP_SUMMARY
          echo "| 合格 | 失敗 | 合計 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| ${{ steps.results.outputs.passed }} | ${{ steps.results.outputs.failed }} | ${{ steps.results.outputs.total }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### カバレッジ" >> $GITHUB_STEP_SUMMARY
          echo "- Lines: ${{ steps.coverage.outputs.lines }}%" >> $GITHUB_STEP_SUMMARY
          echo "- Functions: ${{ steps.coverage.outputs.functions }}%" >> $GITHUB_STEP_SUMMARY
